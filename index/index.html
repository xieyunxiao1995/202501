
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mythic Dungeon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

      :root {
        --gold: #FFD700;
        --bg-dark: #0f0505;
      }

      body {
        font-family: 'Microsoft YaHei', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        overflow: hidden;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      .font-art { font-family: 'Ma Shan Zheng', cursive; }
      .font-num { font-family: 'Bangers', cursive; letter-spacing: 1px; }
      .font-retro { font-family: 'VT323', monospace; }

      .vignette {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
        pointer-events: none;
        z-index: 998;
      }

      /* Animations */
      @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
        100% { transform: translateY(-80px) scale(1); opacity: 0; }
      }
      .animate-float { animation: floatUp 1s ease-out forwards; }

      @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 1px, 0); }
        20%, 80% { transform: translate3d(2px, -2px, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 4px, 0); }
        40%, 60% { transform: translate3d(4px, -4px, 0); }
      }
      .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

      @keyframes pulse-red {
        0%, 100% { box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        50% { box-shadow: 0 0 25px rgba(255,0,0,0.6); }
      }
      .danger-pulse { animation: pulse-red 1.5s infinite; }

      /* Card 3D Flip */
      .perspective-1000 { perspective: 1000px; }
      .preserve-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }

      /* Scrollbar hidden */
      ::-webkit-scrollbar { display: none; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <div class="vignette"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
