name: sanguogame
description: "无双魏蜀吴 - 三国策略卡牌RPG"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 网络
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # 路由
  go_router: ^14.0.0

  # 本地存储
  hive_ce: ^2.0.0
  hive_ce_flutter: ^2.0.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # 游戏引擎
  flame: ^1.18.0

  # 音频
  audioplayers: ^6.7.1
  just_audio: ^0.9.36

  # 工具
  get_it: ^7.6.7
  injectable: ^2.3.2
  logger: ^2.0.2
  intl: ^0.20.2
  crypto: ^3.0.3

  # 中文字体支持
  google_fonts: ^6.1.0

  # 拼音（武将搜索）
  pinyin: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  config:
    enable-swift-package-manager: false      

  assets:
    - assets/data/
    - assets/Bg/
    - assets/UI/
    - assets/images/ui/
    - assets/images/city/
    - assets/images/generals/normal/
    - assets/images/generals/awakened/
    - assets/images/generals/avatars/
    - assets/images/scenes/
    - assets/images/battlefields/
    - assets/images/effects/
    - assets/images/formations/
    - assets/images/tactics/
    - assets/images/equipment/
    - assets/audio/bgm/
    - assets/audio/sfx/
    - assets/audio/voice/
    - assets/audio/ambient/
    - assets/animations/rive/
    - assets/animations/spine/
    - assets/animations/lottie/
    - assets/fonts/
    - assets/shaders/

  # fonts:
  #   - family: Calligraphy
  #     fonts:
  #       - asset: assets/fonts/calligraphy.ttf
  #   - family: SongTi
  #     fonts:
  #       - asset: assets/fonts/songti.ttf
  #   - family: KaiTi
  #     fonts:
  #       - asset: assets/fonts/kaiti.ttf
