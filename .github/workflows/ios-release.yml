name: Build and Distribute

on:
  push:
    branches:
      - main

jobs:
  build:
    name: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v2

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app


      - uses: subosito/flutter-action@v1
        with:
          flutter-version: '3.44.1' 

      - name: Install Certificate and Provisioning Profile
        env:
          CERTIFICATE_BASE64: 
          CERTIFICATE_PASSWORD: "123"
          PROVISIONING_PROFILE_BASE64: 
          KEYCHAIN_PASSWORD: "111111"
        run: |
          set -euo pipefail

          # 创建并启用临时钥匙串：密码必须和 set-key-partition-list 一致
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # 保持原来的 Base64 证书不变：只修复导入方式，确保私钥可被 codesign 读取
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          rm -f certificate.p12

          # CI 必须设置 partition list，否则 Xcode/codesign 可能找不到私钥或无权限使用私钥
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

          echo "Available code signing identities:"
          security find-identity -v -p codesigning build.keychain

          # 安装 provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          security cms -D -i profile.mobileprovision > profile.plist

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' profile.plist || true)
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' profile.plist || true)

          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "Installed provisioning profile:"
          echo "UUID=$PROFILE_UUID"
          echo "NAME=$PROFILE_NAME"
          echo "TEAM=$PROFILE_TEAM"

      - name: Build IPA
        run: |
          set -euo pipefail
          flutter build ipa --release --obfuscate --split-debug-info=./symbols --export-options-plist=ExportOptions.plist --no-tree-shake-icons

      - name: Archive IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa
      
      - name: Upload using iTMSTransporter
        env:
          WORKING_DIRECTORY: build/ios/ipa
          IPA_FILE_NAME: CPDD小屋.ipa
          APPLE_USERNAME: WilliamMurray9793@hotmail.com
          APPLE_PASSWORD: bvxa-vedo-dkox-xcgd
          APPLE_ASC_PROVIDER: 487C73QLBW
        run: |
          cd $WORKING_DIRECTORY
          git clone https://github.com/ZhangLi1984/itsm.git
          ./itsm/bin/iTMSTransporter -assetFile $IPA_FILE_NAME -u $APPLE_USERNAME -p $APPLE_PASSWORD -m upload -asc_provider $APPLE_ASC_PROVIDER

      - name: Clean project and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git rm -rf .
          git clean -fxd
          echo "Last updated: $(date '+%Y-%m-%d %H:%M:%S')" > README.md
          git add README.md
          git commit -m "清空项目，仅保留更新时间戳的 README"
          git push origin main --force