<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星轨合成 Orbit Merge v3.0</title>
    <style>
        :root {
            --bg-color: #030408;
            --ui-blue: #00f0ff;
            --ui-purple: #9d00ff;
            --ui-red: #ff003c;
            --ui-gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* UI Layer Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: auto;
        }

        .stats {
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--ui-blue);
        }

        .stats span { color: var(--ui-blue); }
        .base-hp { color: var(--ui-red); text-shadow: 0 0 10px var(--ui-red); }

        /* Deep Space Protocol (3-Choose-1) */
        #protocol-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(10,10,30,0.6) 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 100;
        }

        #protocol-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .protocol-title {
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 20px var(--ui-gold);
            animation: pulse 2s infinite;
        }

        .cards-container {
            display: flex;
            gap: 20px;
            perspective: 1000px;
            padding: 0 20px;
        }

        .card {
            width: 100px;
            height: 150px;
            background: rgba(20, 20, 30, 0.8);
            border: 2px solid #555;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transform: rotateX(60deg) translateY(50px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        #protocol-screen.active .card {
            transform: rotateX(0deg) translateY(0);
            opacity: 1;
        }

        #protocol-screen.active .card:nth-child(1) { transition-delay: 0.1s; }
        #protocol-screen.active .card:nth-child(2) { transition-delay: 0.2s; }
        #protocol-screen.active .card:nth-child(3) { transition-delay: 0.3s; }

        .card:hover {
            transform: scale(1.05) translateY(-10px) !important;
            box-shadow: 0 0 20px currentColor;
        }

        .card.r-rare { border-color: #0088ff; color: #0088ff; }
        .card.sr-rare { border-color: #aa00ff; color: #aa00ff; }
        .card.ssr-rare { border-color: #ff0055; color: #ff0055; }

        .card-tier { font-size: 0.8rem; font-weight: bold; }
        .card-name { font-size: 1rem; font-weight: bold; color: white; margin-top: 5px;}
        .card-desc { font-size: 0.7rem; color: #aaa; margin-top: auto; }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px var(--ui-gold); }
            50% { text-shadow: 0 0 30px var(--ui-gold), 0 0 10px #fff; }
            100% { text-shadow: 0 0 10px var(--ui-gold); }
        }

        /* Screen Shake */
        .shake { animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="header">
            <div class="stats">星尘: <span id="stardust-disp">0</span></div>
            <div class="stats base-hp">基地 HP: <span id="hp-disp">100</span>%</div>
        </div>
    </div>

    <div id="protocol-screen">
        <div class="protocol-title">深空协议 (3选1)</div>
        <div class="cards-container" id="cards-container">
            <!-- Cards injected via JS -->
        </div>
    </div>

<script>
/**
 * 星轨合成 Orbit Merge v3.0
 * 核心引擎与逻辑实现
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // 优化性能
let W, H;

// 游戏全局状态
const state = {
    stardust: 50,
    baseHp: 100,
    wave: 1,
    timeScale: 1.0, 
    lastTime: 0,
    score: 0,
    isChoosingBuff: false,
    overclockTimer: 0,
    combo: 0,
    comboTimer: 0,
    blackHoleWarn: false,
    lastClickTime: 0 // 用于黑洞双击检测
};

// 伪3D 透视常量
let VPx, VPy, BaseY;
const TRACK_COUNT = 5;
let tracksX = []; // 轨道在防线基线上的X坐标

// 游戏实体列队
let grid = []; // 4x4
const GRID_COLS = 4;
const GRID_ROWS = 4;
let gridRect = { x:0, y:0, w:0, h:0, cellSize:0 };

let towers = []; // 防御塔 (部署在轨道上)
let enemies = [];
let projectiles = [];
let particles = [];

// 拖拽状态
const dragState = {
    active: false,
    node: null, // 被拖拽的节点
    startX: 0,
    startY: 0,
    currentX: 0,
    currentY: 0,
    originCol: -1,
    originRow: -1
};

// 颜色与表现映射 (1-5阶)
const TIER_COLORS = ['#00ff88', '#00c3ff', '#b700ff', '#ff00aa', '#ffea00'];
const TIER_NAMES = ['基础', '脉冲', '引力', '相位', '星环'];
const TIER_SHAPES = [3, 4, 5, 6, 8]; // 边数

// 调整Canvas大小
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    
    // 透视参数配置
    VPx = W / 2;
    VPy = -H * 0.15; // 消失点在屏幕上方外侧
    BaseY = H * 0.55; // 屏幕 55% 处为防线

    // 轨道配置 (5条线均匀分布在防线上)
    tracksX = [];
    const trackSpacing = W / (TRACK_COUNT + 1);
    for(let i = 1; i <= TRACK_COUNT; i++) {
        tracksX.push(i * trackSpacing);
    }
    
    // 初始化防御塔占位
    if(towers.length === 0){
        for(let i=0; i<TRACK_COUNT; i++) towers.push(null);
    }

    // 底部合成网格配置 (4x4)
    const padding = 20;
    gridRect.w = W - padding * 2;
    gridRect.cellSize = gridRect.w / GRID_COLS;
    gridRect.h = gridRect.cellSize * GRID_ROWS;
    gridRect.x = padding;
    gridRect.y = BaseY + 30 + (H - BaseY - 30 - gridRect.h) / 2; // 居中于下半屏
    
    // 给底部黑洞留出空间
    if(gridRect.y + gridRect.h > H - 60) {
        gridRect.y = H - 60 - gridRect.h; 
    }
}
window.addEventListener('resize', resize);

/**
 * 核心：伪3D单点透视投影公式
 * @param {number} x 世界X坐标 (基于BaseY的基线)
 * @param {number} y 世界Y坐标 (深度, 从 VPy 到 BaseY)
 * @returns {object} {x: 屏幕X, y: 屏幕Y, scale: 缩放比}
 */
function project3D(x, y) {
    if (y > BaseY) return { x, y, scale: 1 }; // 超出防线即为扁平2D空间
    // Scale: 从 VP (0) 线性放大到 Base (1)
    let scale = Math.max(0.01, (y - VPy) / (BaseY - VPy));
    let screenX = VPx + (x - VPx) * scale;
    return { x: screenX, y: y, scale: scale };
}

// ---------------- 游戏实体类 ----------------

class Node {
    constructor(tier, col, row) {
        this.tier = tier; // 1-5
        this.col = col;
        this.row = row;
        // 视觉坐标 (带缓动)
        this.vx = gridRect.x + col * gridRect.cellSize + gridRect.cellSize/2;
        this.vy = gridRect.y + row * gridRect.cellSize + gridRect.cellSize/2;
        this.scale = 0; // 出场动画
    }

    update(dt) {
        if(this.scale < 1) this.scale += dt * 5;
        if(this.scale > 1) this.scale = 1;

        if (dragState.active && dragState.node === this) {
            // 拖拽时跟随手指
            this.vx = dragState.currentX;
            this.vy = dragState.currentY;
        } else {
            // 缓动回网格位置
            let targetX = gridRect.x + this.col * gridRect.cellSize + gridRect.cellSize/2;
            let targetY = gridRect.y + this.row * gridRect.cellSize + gridRect.cellSize/2;
            this.vx += (targetX - this.vx) * 15 * dt;
            this.vy += (targetY - this.vy) * 15 * dt;
        }
    }

    draw(ctx) {
        let x = this.vx;
        let y = this.vy;
        let scale = this.scale;
        
        // 如果被拖拽到了上半屏，应用透视形变！(跃迁效果)
        if (dragState.active && dragState.node === this && y < BaseY) {
            const trackIdx = Math.max(0, Math.min(TRACK_COUNT-1, Math.floor(x / (W/TRACK_COUNT))));
            const targetTrackX = tracksX[trackIdx];
            // 模拟向轨道吸附并缩放
            x += (targetTrackX - x) * 0.5;
            let p = project3D(x, y);
            x = p.x;
            y = p.y;
            scale *= p.scale;
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        
        const color = TIER_COLORS[this.tier - 1];
        
        // 拖拽时的高亮发光
        if (dragState.active && dragState.node === this) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.scale(1.2, 1.2);
        } else {
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
        }

        // 绘制多边形节点
        ctx.beginPath();
        const sides = TIER_SHAPES[this.tier - 1];
        const r = gridRect.cellSize * 0.35;
        for (let i = 0; i < sides; i++) {
            let angle = i * (Math.PI * 2 / sides) - Math.PI / 2;
            let px = Math.cos(angle) * r;
            let py = Math.sin(angle) * r;
            if(i===0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = color;
        ctx.stroke();
        ctx.fillStyle = color + '40'; // 25% opacity
        ctx.fill();

        // 内部阶级文字
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("T" + this.tier, 0, 0);

        ctx.restore();
    }
}

class Enemy {
    constructor(trackIdx) {
        this.trackIdx = trackIdx;
        this.y = VPy + 10; // 从消失点略低处生成
        this.baseSpeed = 30 + state.wave * 5; 
        this.hp = 10 + state.wave * 15;
        this.maxHp = this.hp;
        this.tier = Math.floor(Math.random() * 3) + 1; // 敌人大小/颜色
        this.markedForDeath = false;
    }

    update(dt) {
        this.y += this.baseSpeed * dt;
        if (this.y >= BaseY) {
            // 撞击防线
            state.baseHp -= this.tier * 2;
            updateUI();
            this.markedForDeath = true;
            createExplosion(tracksX[this.trackIdx], BaseY, '#ff0000', 20);
            document.body.classList.add('shake');
            setTimeout(()=>document.body.classList.remove('shake'), 400);
        }
    }

    draw(ctx) {
        const x = tracksX[this.trackIdx];
        const p = project3D(x, this.y);
        
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(p.scale, p.scale);
        
        // 伪3D立体感敌人：暗红发光
        const size = 15 + this.tier * 5;
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff003c';
        ctx.fillStyle = '#1a0000';
        ctx.strokeStyle = '#ff003c';
        ctx.lineWidth = 2;

        // 画一个带棱角的飞船形状 (朝下)
        ctx.beginPath();
        ctx.moveTo(0, size); // 尖端向下
        ctx.lineTo(-size*0.8, -size*0.5);
        ctx.lineTo(0, -size*0.2);
        ctx.lineTo(size*0.8, -size*0.5);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // 血条
        if(this.hp < this.maxHp) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#555';
            ctx.fillRect(-size, -size - 10, size*2, 4);
            ctx.fillStyle = '#ff003c';
            ctx.fillRect(-size, -size - 10, (size*2) * (this.hp / this.maxHp), 4);
        }

        ctx.restore();
    }
}

class Projectile {
    constructor(trackIdx, x, y, tier) {
        this.trackIdx = trackIdx;
        this.x = x;
        this.y = y; // 从 BaseY 发射
        this.tier = tier;
        this.speed = 300;
        this.damage = Math.pow(2, tier) * 5;
        this.color = TIER_COLORS[tier - 1];
        this.markedForDeath = false;
    }

    update(dt) {
        this.y -= this.speed * dt;
        if(this.y < VPy) this.markedForDeath = true;

        // 碰撞检测
        for(let e of enemies) {
            if(!e.markedForDeath && e.trackIdx === this.trackIdx && Math.abs(e.y - this.y) < 20) {
                e.hp -= this.damage;
                this.markedForDeath = true;
                createExplosion(this.x, e.y, this.color, 10);
                if(e.hp <= 0) {
                    e.markedForDeath = true;
                    state.stardust += 2 + e.tier;
                    updateUI();
                }
                break;
            }
        }
    }

    draw(ctx) {
        const p = project3D(this.x, this.y);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(p.scale, p.scale);

        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = '#fff';
        
        ctx.beginPath();
        ctx.arc(0, 0, 3 + this.tier, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

// ---------------- 游戏系统逻辑 ----------------

function initGrid() {
    grid = [];
    for(let c=0; c<GRID_COLS; c++){
        grid[c] = [];
        for(let r=0; r<GRID_ROWS; r++){
            grid[c][r] = null;
        }
    }
    // 初始赠送几个节点
    spawnNode(1);
    spawnNode(1);
    spawnNode(2);
}

function getEmptySlots() {
    let slots = [];
    for(let c=0; c<GRID_COLS; c++){
        for(let r=0; r<GRID_ROWS; r++){
            if(!grid[c][r]) slots.push({c, r});
        }
    }
    return slots;
}

function spawnNode(tier = 1) {
    let slots = getEmptySlots();
    if(slots.length === 0) return false;
    let slot = slots[Math.floor(Math.random() * slots.length)];
    grid[slot.c][slot.r] = new Node(tier, slot.c, slot.r);
    
    // 黑洞警告判定
    state.blackHoleWarn = (slots.length - 1 <= 1);
    return true;
}

// 自动生成节点
let spawnTimer = 0;
function processAutoSpawn(dt) {
    spawnTimer += dt;
    if(spawnTimer > 3) { // 每3秒尝试生成
        spawnTimer = 0;
        if(state.stardust >= 5) {
            if(spawnNode(1)) {
                state.stardust -= 5;
                updateUI();
            }
        }
    }
}

// 敌人生成
let enemySpawnTimer = 0;
function processEnemies(dt) {
    enemySpawnTimer += dt;
    let spawnRate = Math.max(0.5, 2.0 - state.wave * 0.1);
    if(enemySpawnTimer > spawnRate) {
        enemySpawnTimer = 0;
        const track = Math.floor(Math.random() * TRACK_COUNT);
        enemies.push(new Enemy(track));
    }
}

// 塔攻击
let towerFireTimers = [0,0,0,0,0];
function processTowers(dt) {
    let baseFireRate = 1.0; 
    // 超频加成
    if(state.overclockTimer > 0) {
        baseFireRate = 0.5; // 攻速翻倍
        state.overclockTimer -= dt;
    }

    for(let i=0; i<TRACK_COUNT; i++) {
        let towerNode = towers[i];
        if(!towerNode) continue;

        towerFireTimers[i] -= dt;
        if(towerFireTimers[i] <= 0) {
            // 检查轨道上是否有敌人
            let hasEnemy = enemies.some(e => e.trackIdx === i && e.y < BaseY - 10);
            if(hasEnemy) {
                // 开火
                projectiles.push(new Projectile(i, tracksX[i], BaseY, towerNode.tier));
                // 阶级越高，基础攻速越快
                towerFireTimers[i] = baseFireRate / (1 + towerNode.tier * 0.2); 
            }
        }
    }
}

// 视觉特效粒子
function createExplosion(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 50 + 20;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0,
            color: color
        });
    }
}

// 连击系统处理
function addCombo() {
    state.combo++;
    state.comboTimer = 3.0; // 3秒不断连
    if(state.combo === 3) {
        // Combo3 奖励 T2
        spawnNode(2);
        createExplosion(W/2, BaseY, '#00f0ff', 30);
    }
    if(state.combo === 5) {
        // Combo5 触发超频
        state.overclockTimer = 4.0;
        state.combo = 0; // 重置
        document.body.classList.add('shake');
        setTimeout(()=>document.body.classList.remove('shake'), 400);
    }
}

function processCombo(dt) {
    if(state.comboTimer > 0) {
        state.comboTimer -= dt;
        if(state.comboTimer <= 0) state.combo = 0;
    }
}


// ---------------- 输入与交互 (Touch & Mouse) ----------------

function getPointerPos(e) {
    if(e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
}

function handleDown(e) {
    if(state.timeScale < 0.5) return; // 子弹时间禁止操作
    let pos = getPointerPos(e);
    let now = Date.now();

    // 检查黑洞双击
    if(pos.y > H - 60) {
        if(now - state.lastClickTime < 300) {
            triggerBlackHole();
        }
        state.lastClickTime = now;
        return;
    }

    // 检查网格节点
    for(let c=0; c<GRID_COLS; c++){
        for(let r=0; r<GRID_ROWS; r++){
            let n = grid[c][r];
            if(n) {
                let dx = pos.x - n.vx;
                let dy = pos.y - n.vy;
                if(dx*dx + dy*dy < 1500) { // 半径约40
                    dragState.active = true;
                    dragState.node = n;
                    dragState.startX = pos.x;
                    dragState.startY = pos.y;
                    dragState.currentX = pos.x;
                    dragState.currentY = pos.y;
                    dragState.originCol = c;
                    dragState.originRow = r;
                    grid[c][r] = null; // 暂时移出网格
                    return;
                }
            }
        }
    }
}

function handleMove(e) {
    if(!dragState.active) return;
    let pos = getPointerPos(e);
    dragState.currentX = pos.x;
    dragState.currentY = pos.y;
}

function handleUp(e) {
    if(!dragState.active) return;
    let n = dragState.node;
    let x = dragState.currentX;
    let y = dragState.currentY;

    // 1. 判断是否部署到上半屏 (Y < BaseY)
    if(y < BaseY) {
        // 计算属于哪个轨道
        const trackIdx = Math.max(0, Math.min(TRACK_COUNT-1, Math.floor(x / (W/TRACK_COUNT))));
        // 部署或者替换
        towers[trackIdx] = new Node(n.tier, 0, 0); // 借用Node对象存储属性
        createExplosion(tracksX[trackIdx], BaseY, TIER_COLORS[n.tier-1], 40);
        // 不放回网格
    } 
    // 2. 否则，判断落在哪个网格
    else {
        let targetCol = Math.floor((x - gridRect.x) / gridRect.cellSize);
        let targetRow = Math.floor((y - gridRect.y) / gridRect.cellSize);
        
        // 边界限制
        targetCol = Math.max(0, Math.min(GRID_COLS-1, targetCol));
        targetRow = Math.max(0, Math.min(GRID_ROWS-1, targetRow));

        let targetNode = grid[targetCol][targetRow];

        if(targetNode && targetNode.tier === n.tier && n.tier < 5) {
            // 合并！
            targetNode.tier++; // 升阶
            addCombo();
            createExplosion(targetNode.vx, targetNode.vy, TIER_COLORS[targetNode.tier-1], 20);
            // 节点 n 消失 (不放回)
        } else if (targetNode) {
            // 占据且不同阶，互换位置
            grid[dragState.originCol][dragState.originRow] = targetNode;
            targetNode.col = dragState.originCol;
            targetNode.row = dragState.originRow;
            
            grid[targetCol][targetRow] = n;
            n.col = targetCol;
            n.row = targetRow;
        } else {
            // 空位，直接放下
            grid[targetCol][targetRow] = n;
            n.col = targetCol;
            n.row = targetRow;
        }
    }

    dragState.active = false;
    dragState.node = null;
}

window.addEventListener('mousedown', handleDown);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleUp);
window.addEventListener('touchstart', handleDown, {passive: false});
window.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
window.addEventListener('touchend', handleUp);

// 黑洞清盘机制
function triggerBlackHole() {
    if(state.stardust < 20) return; // 资金不足
    state.stardust -= 20;
    
    // 找到场上最低阶节点
    let lowestTier = 6;
    let toDestroy = [];
    for(let c=0; c<GRID_COLS; c++){
        for(let r=0; r<GRID_ROWS; r++){
            let n = grid[c][r];
            if(n && n.tier < lowestTier) lowestTier = n.tier;
        }
    }

    if(lowestTier < 6) {
        for(let c=0; c<GRID_COLS; c++){
            for(let r=0; r<GRID_ROWS; r++){
                let n = grid[c][r];
                if(n && n.tier === lowestTier) {
                    createExplosion(n.vx, n.vy, '#ffffff', 15);
                    grid[c][r] = null;
                }
            }
        }
        updateUI();
    }
}


// ---------------- 深空协议 (Rougelite 3选1) ----------------

const BUFF_POOL = [
    { name: '动能回收', tier: 'R', class: 'r-rare', desc: '立即获得 50 星尘并生成 2 个 T2 节点。', action: () => { state.stardust+=50; spawnNode(2); spawnNode(2); updateUI();} },
    { name: '引力塌陷', tier: 'SR', class: 'sr-rare', desc: '所有防线外的敌人当前生命值减半。', action: () => { enemies.forEach(e => e.hp /= 2); createExplosion(VPx, BaseY, '#9d00ff', 100); } },
    { name: '防线超频', tier: 'SR', class: 'sr-rare', desc: '基地恢复 50% HP，且触发长效超频。', action: () => { state.baseHp = Math.min(100, state.baseHp + 50); state.overclockTimer = 10; updateUI();} },
    { name: '维度共振', tier: 'SSR', class: 'ssr-rare', desc: '场上所有存在的防御塔立即提升 1 阶！', action: () => { 
        towers.forEach(t => { if(t && t.tier < 5) t.tier++; }); 
        createExplosion(VPx, BaseY, '#ff00aa', 200);
    }}
];

let protocolTimer = 0;
function processProtocol(dt) {
    if(state.isChoosingBuff) return;
    protocolTimer += dt;
    if(protocolTimer > 45) { // 每45秒触发一次
        protocolTimer = 0;
        triggerProtocol();
    }
}

function triggerProtocol() {
    state.isChoosingBuff = true;
    state.timeScale = 0.05; // 子弹时间！(不是0，保留微弱动画)

    const ui = document.getElementById('protocol-screen');
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    // 随机抽3张卡
    let shuffled = BUFF_POOL.sort(() => 0.5 - Math.random());
    let selected = shuffled.slice(0, 3);

    selected.forEach(buff => {
        let card = document.createElement('div');
        card.className = `card ${buff.class}`;
        card.innerHTML = `
            <div class="card-tier">${buff.tier}</div>
            <div class="card-name">${buff.name}</div>
            <div class="card-desc">${buff.desc}</div>
        `;
        card.onclick = () => {
            buff.action();
            resumeGame();
        };
        container.appendChild(card);
    });

    ui.classList.add('active');
}

function resumeGame() {
    document.getElementById('protocol-screen').classList.remove('active');
    state.isChoosingBuff = false;
    state.timeScale = 1.0;
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'), 500);
}


// ---------------- 渲染引擎 ----------------

function drawBackground() {
    // 宇宙深空背景
    ctx.fillStyle = '#030408';
    ctx.fillRect(0, 0, W, H);

    // 消失点引力漩涡
    let radGrad = ctx.createRadialGradient(VPx, VPy, 10, VPx, VPy, W*0.8);
    let timeColor = state.isChoosingBuff ? 'rgba(50, 0, 50, ' : 'rgba(0, 30, 60, ';
    radGrad.addColorStop(0, timeColor + '0.8)');
    radGrad.addColorStop(0.5, timeColor + '0.2)');
    radGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = radGrad;
    ctx.fillRect(0, 0, W, BaseY);
}

function drawPerspectiveTracks() {
    ctx.save();
    ctx.lineWidth = 2;
    
    // 透视轨道线
    for(let i=0; i<TRACK_COUNT; i++) {
        let baseX = tracksX[i];
        
        ctx.beginPath();
        ctx.moveTo(baseX, BaseY);
        // 线条连向 VP
        ctx.lineTo(VPx, VPy);
        
        // 发光与渐变
        let lineGrad = ctx.createLinearGradient(baseX, BaseY, VPx, VPy);
        let color = towers[i] ? TIER_COLORS[towers[i].tier-1] : '#223344';
        
        if(state.overclockTimer > 0) color = '#ff003c'; // 超频变红

        lineGrad.addColorStop(0, color);
        lineGrad.addColorStop(1, 'transparent');
        
        ctx.strokeStyle = lineGrad;
        ctx.shadowBlur = towers[i] ? 15 : 5;
        ctx.shadowColor = color;
        ctx.stroke();

        // 绘制防线塔基座
        ctx.beginPath();
        ctx.ellipse(baseX, BaseY, 30, 10, 0, 0, Math.PI*2);
        ctx.fillStyle = color + '20';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.stroke();

        // 绘制塔体 (简单的几何叠加)
        if(towers[i]) {
            let t = towers[i];
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(baseX, BaseY - 5);
            ctx.lineTo(baseX - 15, BaseY - 25 - t.tier*5);
            ctx.lineTo(baseX + 15, BaseY - 25 - t.tier*5);
            ctx.closePath();
            ctx.fill();
        }
    }
    ctx.restore();
}

function drawDividerAndCombo() {
    // 基准分割线
    ctx.beginPath();
    ctx.moveTo(0, BaseY);
    ctx.lineTo(W, BaseY);
    ctx.strokeStyle = state.overclockTimer > 0 ? '#ff003c' : '#00f0ff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Combo UI槽
    if(state.comboTimer > 0 || state.combo > 0) {
        let barW = 200;
        let barH = 4;
        let cx = W/2 - barW/2;
        let cy = BaseY + 10;
        
        ctx.fillStyle = '#222';
        ctx.fillRect(cx, cy, barW, barH);
        
        let fillRatio = state.combo / 5.0; // 满5次超频
        ctx.fillStyle = '#ffea00';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffea00';
        ctx.fillRect(cx, cy, barW * fillRatio, barH);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#fff';
        ctx.font = '12px sans-serif';
        ctx.fillText(`COMBO x${state.combo}`, W/2, cy + 15);
    }
}

function drawGridAndNodes() {
    // 绘制网格背景
    ctx.strokeStyle = '#1a2233';
    ctx.lineWidth = 2;
    for(let c=0; c<GRID_COLS; c++){
        for(let r=0; r<GRID_ROWS; r++){
            ctx.strokeRect(gridRect.x + c*gridRect.cellSize, gridRect.y + r*gridRect.cellSize, gridRect.cellSize, gridRect.cellSize);
        }
    }

    // 绘制下半部分节点
    for(let c=0; c<GRID_COLS; c++){
        for(let r=0; r<GRID_ROWS; r++){
            let n = grid[c][r];
            if(n) n.draw(ctx);
        }
    }
}

function drawBlackHole() {
    const bhY = H - 30;
    ctx.save();
    
    // 黑洞震动动画
    let pulse = 1 + Math.sin(Date.now() / 200) * 0.1;
    let color = state.blackHoleWarn ? '#ff003c' : '#9d00ff';
    
    ctx.translate(W/2, bhY);
    ctx.scale(pulse, pulse);
    
    let radGrad = ctx.createRadialGradient(0,0,0, 0,0, 40);
    radGrad.addColorStop(0, '#000');
    radGrad.addColorStop(0.8, color);
    radGrad.addColorStop(1, 'transparent');
    
    ctx.fillStyle = radGrad;
    ctx.beginPath();
    ctx.arc(0,0, 40, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("双击回收(20星尘)", 0, -15);
    
    ctx.restore();
}

function updateParticles(dt) {
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt * 2.0; // 生命周期 0.5秒
        
        if(p.life <= 0) {
            particles.splice(i, 1);
        } else {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
            ctx.globalAlpha = 1.0;
        }
    }
}

function updateUI() {
    document.getElementById('stardust-disp').innerText = Math.floor(state.stardust);
    document.getElementById('hp-disp').innerText = Math.floor(state.baseHp);
    if(state.baseHp <= 0) {
        alert("基地被摧毁！游戏结束。");
        location.reload();
    }
}

// ---------------- 主循环 ----------------

function gameLoop(timestamp) {
    let dt = (timestamp - state.lastTime) / 1000;
    if(dt > 0.1) dt = 0.1; // 防止切屏导致巨大的跳跃
    state.lastTime = timestamp;

    let realDt = dt * state.timeScale;

    // 逻辑更新
    processAutoSpawn(realDt);
    processEnemies(realDt);
    processTowers(realDt);
    processCombo(realDt);
    processProtocol(dt); // 即使在子弹时间也按物理时间计时准备下一次

    enemies.forEach(e => e.update(realDt));
    projectiles.forEach(p => p.update(realDt));
    
    for(let c=0; c<GRID_COLS; c++) {
        for(let r=0; r<GRID_ROWS; r++) {
            if(grid[c][r]) grid[c][r].update(dt); // UI动画不受子弹时间影响
        }
    }
    if(dragState.node) dragState.node.update(dt);

    // 清理死亡实体
    enemies = enemies.filter(e => !e.markedForDeath);
    projectiles = projectiles.filter(p => !p.markedForDeath);

    // 渲染管线
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    
    drawPerspectiveTracks();

    // Y-Sort 排序画敌人，确保前面的遮挡后面的
    enemies.sort((a,b) => a.y - b.y);
    enemies.forEach(e => e.draw(ctx));
    
    projectiles.forEach(p => p.draw(ctx));

    drawDividerAndCombo();
    drawGridAndNodes();
    drawBlackHole();
    
    // 最后画被拖拽的节点 (最高层级)
    if(dragState.active && dragState.node) {
        dragState.node.draw(ctx);
    }

    updateParticles(dt); // 粒子更新并绘制不受子弹时间影响

    requestAnimationFrame(gameLoop);
}

// 启动
resize();
initGrid();
updateUI();
requestAnimationFrame(gameLoop);

</script>
